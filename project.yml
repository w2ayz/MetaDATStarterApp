name: MetaDATStarterApp

packages:
  MetaWearablesDAT:
    url: https://github.com/facebook/meta-wearables-dat-ios
    from: "0.5.0"

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  MetaDATStarterApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - MetaDATStarterApp
    dependencies:
      - package: MetaWearablesDAT
        product: MWDATCore
      - package: MetaWearablesDAT
        product: MWDATCamera
      - package: MetaWearablesDAT
        product: MWDATMockDevice
    info:
      path: MetaDATStarterApp/Info.plist
      properties:
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        CFBundleURLTypes:
          - CFBundleURLName: $(PRODUCT_BUNDLE_IDENTIFIER)
            CFBundleURLSchemes: [metadatstarterapp]
        LSApplicationQueriesSchemes: [fb-viewapp]
        UISupportedExternalAccessoryProtocols: [com.meta.ar.wearable]
        UIBackgroundModes: [bluetooth-peripheral, external-accessory]
        NSBluetoothAlwaysUsageDescription: "This app uses Bluetooth to connect to Ray-Ban Meta glasses."
        NSPhotoLibraryAddUsageDescription: "Save captured media to your library"
        MWDAT:
          AppLinkURLScheme: "metadatstarterapp://"
          MetaAppID: "$(META_APP_ID)"
          ClientToken: "$(META_CLIENT_TOKEN)"
          TeamID: $(DEVELOPMENT_TEAM)
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.MetaDATStarterApp
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
